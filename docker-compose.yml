services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: geraeteverleih
      POSTGRES_PASSWORD: geraeteverleih
      POSTGRES_DB: geraeteverleih
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data/altdaten_seed.sql:/docker-entrypoint-initdb.d/01_altdaten_seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geraeteverleih"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://geraeteverleih:geraeteverleih@postgres:5432/geraeteverleih
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  pgdata:
